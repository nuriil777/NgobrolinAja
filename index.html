<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NgobrolinAja — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg0: #080b10;
  --bg1: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --bg4: #21262d;
  --bg5: #2d333b;
  --border: #30363d;
  --border-light: #3d444d;
  --text1: #e6edf3;
  --text2: #9198a1;
  --text3: #656d76;
  --accent: #f97316;
  --accent2: #fb923c;
  --accent-dim: rgba(249,115,22,0.12);
  --accent-glow: rgba(249,115,22,0.25);
  --green: #3fb950;
  --blue: #58a6ff;
  --red: #f85149;
  --r: 10px;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg0);
  color: var(--text1);
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── AUTH SCREEN ─── */
#authScreen {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 30% 20%, rgba(249,115,22,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(88,166,255,0.06) 0%, transparent 60%),
              var(--bg0);
}

.auth-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 40px 36px;
  width: 380px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.92) translateY(16px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.auth-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
}
.auth-logo-icon {
  width: 42px; height: 42px; border-radius: 11px;
  background: linear-gradient(135deg, var(--accent), #f59e0b);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.auth-logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.auth-logo-text span { color: var(--accent); }

.auth-tabs {
  display: flex; gap: 4px;
  background: var(--bg3); border-radius: 8px; padding: 4px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 8px; text-align: center;
  border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  color: var(--text2); border: none; background: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.auth-tab.active { background: var(--bg5); color: var(--text1); }

.field-group { margin-bottom: 14px; }
.field-group label { font-size: 12px; color: var(--text2); font-weight: 600; display: block; margin-bottom: 6px; letter-spacing: 0.3px; }
.field-group input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
  font-size: 13px; color: var(--text1); outline: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.field-group input::placeholder { color: var(--text3); }

.auth-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: white;
  border: none; border-radius: 9px;
  font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all 0.15s; margin-top: 4px;
  letter-spacing: 0.3px;
}
.auth-btn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
.auth-btn:active { transform: translateY(0); }
.auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.auth-err {
  background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--red); margin-bottom: 14px;
  display: none;
}

/* ─── APP SCREEN ─── */
#appScreen {
  display: none;
  width: 100%; height: 100%;
  flex-direction: column;
}

/* TOP NAV */
.topnav {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  height: 44px; padding: 0 14px;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.topnav::-webkit-scrollbar { display: none; }
.tnav-logo { font-size: 14px; font-weight: 800; letter-spacing: -0.3px; margin-right: 8px; }
.tnav-logo span { color: var(--accent); }
.tnav-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.tnav-btn {
  padding: 4px 11px; border-radius: 6px; font-size: 11px; font-weight: 700;
  cursor: pointer; border: none; white-space: nowrap;
  font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0.4px; transition: all 0.15s;
}
.tnav-btn.orange { background: var(--accent); color: white; }
.tnav-btn.ghost { background: var(--bg4); color: var(--text2); border: 1px solid var(--border); }
.tnav-btn.ghost:hover { background: var(--bg5); color: var(--text1); }
.tnav-user {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text2);
}
.tnav-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: white;
  background: linear-gradient(135deg, var(--accent), #f59e0b);
  flex-shrink: 0;
}
.tnav-signout {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  background: transparent; border: 1px solid var(--border);
  color: var(--text3); cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all 0.15s;
}
.tnav-signout:hover { border-color: var(--red); color: var(--red); background: rgba(248,81,73,0.08); }

/* MAIN */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 275px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sb-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
.sb-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 9px; padding: 8px 12px;
  transition: border-color 0.15s;
}
.sb-search:focus-within { border-color: var(--accent); }
.sb-search input {
  background: none; border: none; outline: none;
  font-size: 12px; color: var(--text1);
  font-family: 'Plus Jakarta Sans', sans-serif; width: 100%;
}
.sb-search input::placeholder { color: var(--text3); }

.sb-section { padding: 10px 10px 4px; }
.sb-section-label {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; text-transform: uppercase;
  padding: 0 4px; margin-bottom: 6px;
}

.new-room-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px dashed rgba(249,115,22,0.4);
  border-radius: 9px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all 0.15s; margin-bottom: 6px; letter-spacing: 0.3px;
}
.new-room-btn:hover { background: rgba(249,115,22,0.2); border-color: var(--accent); }

.room-list { flex: 1; overflow-y: auto; padding: 4px 6px 8px; }
.room-list::-webkit-scrollbar { width: 3px; }
.room-list::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 4px; }

.room-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 9px;
  cursor: pointer; transition: background 0.12s;
  position: relative;
}
.room-item:hover { background: var(--bg3); }
.room-item.active { background: var(--bg4); }
.room-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 60%; background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.room-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  background: var(--bg4); border: 1px solid var(--border);
}
.room-meta { flex: 1; min-width: 0; }
.room-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.room-preview { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.room-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.room-time { font-size: 10px; color: var(--text3); }
.room-badge { background: var(--accent); color: white; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 10px; }

/* CHAT AREA */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg1); }

/* CHAT HEADER */
.chat-header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.ch-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--bg4); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.ch-info .ch-name { font-size: 15px; font-weight: 700; }
.ch-info .ch-sub { font-size: 11px; color: var(--text3); }
.ch-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.ch-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
}
.ch-search input {
  background: none; border: none; outline: none;
  font-size: 12px; color: var(--text1);
  font-family: 'Plus Jakarta Sans', sans-serif; width: 160px;
}
.ch-search input::placeholder { color: var(--text3); }
.icon-btn {
  width: 32px; height: 32px; border-radius: 7px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.15s;
}
.icon-btn:hover { background: var(--bg4); color: var(--text1); }

/* MESSAGES */
.messages-wrap { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }
.messages-wrap::-webkit-scrollbar { width: 4px; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 4px; }

.empty-chat {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--text3); text-align: center;
}
.empty-chat .big-emoji { font-size: 48px; margin-bottom: 4px; }
.empty-chat h3 { font-size: 16px; font-weight: 700; color: var(--text2); }
.empty-chat p { font-size: 13px; max-width: 280px; line-height: 1.6; }

.no-room-selected {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: var(--text3);
}
.no-room-selected .icon { font-size: 56px; opacity: 0.4; }
.no-room-selected h3 { font-size: 16px; font-weight: 700; color: var(--text2); }
.no-room-selected p { font-size: 13px; color: var(--text3); }

.day-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 10px 0 8px; flex-shrink: 0;
}
.day-divider::before, .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.day-divider span { font-size: 11px; color: var(--text3); white-space: nowrap; font-weight: 500; }

.msg-group { display: flex; flex-direction: column; gap: 1px; margin-bottom: 8px; }

.msg-row { display: flex; gap: 8px; padding: 2px 0; }
.msg-row.self { flex-direction: row-reverse; }

.msg-av {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; flex-shrink: 0;
  align-self: flex-end; margin-bottom: 2px;
}

.msg-content { max-width: 62%; display: flex; flex-direction: column; gap: 2px; }
.msg-row.self .msg-content { align-items: flex-end; }

.msg-sender-label { font-size: 11px; font-weight: 600; margin-bottom: 2px; }

.bubble {
  padding: 9px 13px; border-radius: 14px;
  font-size: 13px; line-height: 1.55; word-break: break-word;
  position: relative;
}
.bubble.other {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text1); border-bottom-left-radius: 4px;
}
.bubble.self {
  background: linear-gradient(135deg, #1a3d2b, #1e4533);
  border: 1px solid #2d5a3d; color: #d1fae5;
  border-bottom-right-radius: 4px;
}

.msg-meta { display: flex; align-items: center; gap: 5px; margin-top: 1px; }
.msg-time { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.msg-tick { font-size: 11px; color: var(--accent); }

/* typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; font-size: 11px; color: var(--text3);
  font-style: italic; min-height: 20px;
}
.typing-dots span {
  display: inline-block; width: 5px; height: 5px;
  background: var(--text3); border-radius: 50;
  animation: typingDot 1.2s infinite; margin: 0 1px;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot {
  0%,80%,100% { transform: scale(1); opacity: 0.4; }
  40% { transform: scale(1.4); opacity: 1; }
}

/* INPUT */
.input-area {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
}
.input-box {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px; display: flex; align-items: center;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.input-box textarea {
  flex: 1; background: none; border: none; outline: none;
  font-size: 13px; color: var(--text1); resize: none;
  font-family: 'Plus Jakarta Sans', sans-serif; max-height: 120px;
  line-height: 1.5; overflow-y: auto;
}
.input-box textarea::placeholder { color: var(--text3); }
.send-btn {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent); color: white; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.send-btn:hover { background: var(--accent2); transform: scale(1.05); box-shadow: 0 4px 16px var(--accent-glow); }
.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  backdrop-filter: blur(4px); animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 28px 24px;
  width: 360px; box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  animation: slideUp 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(20px) scale(0.96); }
  to { opacity:1; transform: translateY(0) scale(1); }
}
.modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 18px; }
.modal .field-group { margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-cancel {
  flex: 1; padding: 10px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.15s;
}
.modal-cancel:hover { background: var(--bg4); color: var(--text1); }
.modal-confirm {
  flex: 2; padding: 10px; background: var(--accent); border: none;
  border-radius: 8px; color: white; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.15s;
}
.modal-confirm:hover { background: var(--accent2); }
.modal-err { font-size: 11px; color: var(--red); margin-top: 6px; display: none; }

/* emoji picker row */
.emoji-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.emoji-pick {
  width: 38px; height: 38px; border-radius: 8px; font-size: 18px;
  background: var(--bg3); border: 2px solid transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.emoji-pick:hover, .emoji-pick.selected { border-color: var(--accent); background: var(--accent-dim); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 18px;
  font-size: 13px; font-weight: 500; color: var(--text1);
  box-shadow: var(--shadow); z-index: 999;
  animation: toastIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center; gap: 8px;
}
@keyframes toastIn {
  from { opacity:0; transform:translateY(12px) scale(0.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

/* helpers */
.hidden { display: none !important; }
.spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* avatar colors */
.av1 { background: linear-gradient(135deg,#f97316,#f59e0b); }
.av2 { background: linear-gradient(135deg,#3b82f6,#06b6d4); }
.av3 { background: linear-gradient(135deg,#10b981,#059669); }
.av4 { background: linear-gradient(135deg,#8b5cf6,#6d28d9); }
.av5 { background: linear-gradient(135deg,#ec4899,#db2777); }
.av6 { background: linear-gradient(135deg,#ef4444,#dc2626); }
.av7 { background: linear-gradient(135deg,#14b8a6,#0d9488); }
.av8 { background: linear-gradient(135deg,#eab308,#ca8a04); }
</style>
</head>
<body>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <div class="auth-logo-text">Ngobrolin<span>Aja</span></div>
    </div>
    <div id="authErr" class="auth-err"></div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Daftar</button>
    </div>

    <div id="loginForm">
      <div class="field-group">
        <label>EMAIL</label>
        <input type="email" id="loginEmail" placeholder="email@kamu.com" autocomplete="email">
      </div>
      <div class="field-group">
        <label>PASSWORD</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">Masuk</button>
    </div>

    <div id="registerForm" class="hidden">
      <div class="field-group">
        <label>NAMA TAMPILAN</label>
        <input type="text" id="regName" placeholder="Nama kamu">
      </div>
      <div class="field-group">
        <label>EMAIL</label>
        <input type="email" id="regEmail" placeholder="email@kamu.com" autocomplete="email">
      </div>
      <div class="field-group">
        <label>PASSWORD</label>
        <input type="password" id="regPassword" placeholder="Min. 6 karakter" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="auth-btn" id="registerBtn" onclick="doRegister()">Buat Akun</button>
    </div>
  </div>
</div>

<!-- ═══ APP SCREEN ═══ -->
<div id="appScreen">
  <!-- TOP NAV -->
  <div class="topnav">
    <div class="tnav-logo">Ngobrolin<span>Aja</span></div>
    <div class="tnav-sep"></div>
    <button class="tnav-btn orange">LIVE CHAT</button>
    <button class="tnav-btn ghost">GROUPS</button>
    <button class="tnav-btn ghost">BROADCAST</button>
    <div class="tnav-user">
      <div class="tnav-avatar" id="navAvatar">?</div>
      <span id="navName" style="font-weight:600;font-size:12px;"></span>
      <button class="tnav-signout" onclick="doSignOut()">Keluar</button>
    </div>
  </div>

  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-header">
        <div class="sb-search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Cari room..." id="searchInput" oninput="filterRooms()">
        </div>
      </div>
      <div class="sb-section">
        <div class="sb-section-label">Ruang Chat</div>
        <button class="new-room-btn" onclick="openNewRoomModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Buat Room Baru
        </button>
      </div>
      <div class="room-list" id="roomList">
        <div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Memuat room...</div>
      </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">
      <div id="noRoomSelected" class="no-room-selected">
        <div class="icon">💬</div>
        <h3>Pilih Room untuk Mulai Chat</h3>
        <p>Pilih room di sebelah kiri atau buat room baru</p>
      </div>

      <div id="chatView" class="hidden" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="chat-header">
          <div class="ch-icon" id="chIcon">💬</div>
          <div class="ch-info">
            <div class="ch-name" id="chName">Room</div>
            <div class="ch-sub" id="chSub">0 anggota</div>
          </div>
          <div class="ch-actions">
            <div class="ch-search">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#656d76" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" placeholder="Cari pesan...">
            </div>
            <button class="icon-btn" title="Info Room" onclick="showRoomInfo()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </button>
          </div>
        </div>

        <div class="messages-wrap" id="messagesWrap">
          <div id="msgContainer"></div>
          <div id="typingIndicator" class="typing-indicator hidden">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span id="typingText"></span>
          </div>
        </div>

        <div class="input-area">
          <div class="input-box">
            <textarea id="msgInput" rows="1" placeholder="Ketik pesan..." onkeydown="handleKey(event)" oninput="autoResize(this); handleTyping()"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW ROOM MODAL -->
<div id="newRoomModal" class="modal-overlay hidden" onclick="closeModalOutside(event,'newRoomModal')">
  <div class="modal">
    <h3>🏠 Buat Room Baru</h3>
    <div class="field-group">
      <label>NAMA ROOM</label>
      <input type="text" id="newRoomName" placeholder="misal: Tim Marketing">
      <div class="modal-err" id="newRoomErr"></div>
    </div>
    <div class="field-group">
      <label>DESKRIPSI (opsional)</label>
      <input type="text" id="newRoomDesc" placeholder="Topik room ini...">
    </div>
    <div class="field-group">
      <label>IKON ROOM</label>
      <div class="emoji-row" id="emojiPicker">
        <!-- emojis injected by JS -->
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('newRoomModal')">Batal</button>
      <button class="modal-confirm" onclick="createRoom()">Buat Room</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, onSnapshot, query, orderBy, limit, serverTimestamp, updateDoc, increment, where } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZAPWXDIPDr6_ye1hr4Qkfw6wMoJccZAg",
  authDomain: "ngobrolin-aja-77.firebaseapp.com",
  projectId: "ngobrolin-aja-77",
  storageBucket: "ngobrolin-aja-77.firebasestorage.app",
  messagingSenderId: "56435429415",
  appId: "1:56435429415:web:64b3f0274b13966e693e02"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ───
let currentUser = null;
let currentRoom = null;
let messagesUnsub = null;
let roomsUnsub = null;
let typingTimeout = null;
let selectedEmoji = '💬';
const EMOJIS = ['💬','🍜','🍕','🎮','📊','💰','🏦','📋','🎯','🔥','⚡','🚀','🎉','💡','🛠️','📢'];

// ─── UTILS ───
function avatarColor(uid) {
  const n = uid.charCodeAt(0) % 8 + 1;
  return 'av' + n;
}
function initials(name) {
  return name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
}
function timeStr(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
}
function dateLabel(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const today = new Date();
  const diff = Math.floor((today - d) / 86400000);
  if (diff === 0) return 'Hari ini';
  if (diff === 1) return 'Kemarin';
  return d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
}
function showToast(msg, icon='✅') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ─── AUTH ───
window.switchTab = (tab) => {
  document.getElementById('authErr').style.display = 'none';
  if (tab === 'login') {
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
  } else {
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
  }
};

function showAuthErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg;
  el.style.display = 'block';
}

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  if (!email || !pw) return showAuthErr('Email dan password wajib diisi.');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Memproses...';
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    showAuthErr(e.code === 'auth/invalid-credential' ? 'Email atau password salah.' : e.message);
    btn.disabled = false; btn.textContent = 'Masuk';
  }
};

window.doRegister = async () => {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw = document.getElementById('regPassword').value;
  if (!name || !email || !pw) return showAuthErr('Semua field wajib diisi.');
  if (pw.length < 6) return showAuthErr('Password minimal 6 karakter.');
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Memproses...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), {
      displayName: name, email, uid: cred.user.uid,
      createdAt: serverTimestamp()
    });
  } catch(e) {
    showAuthErr(e.code === 'auth/email-already-in-use' ? 'Email sudah terdaftar.' : e.message);
    btn.disabled = false; btn.textContent = 'Buat Akun';
  }
};

window.doSignOut = async () => {
  if (roomsUnsub) roomsUnsub();
  if (messagesUnsub) messagesUnsub();
  await signOut(auth);
};

// ─── AUTH STATE ───
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    document.getElementById('navAvatar').textContent = initials(user.displayName || user.email);
    document.getElementById('navName').textContent = user.displayName || user.email;
    initEmojiPicker();
    listenRooms();
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
    currentRoom = null;
  }
});

// ─── ROOMS ───
function listenRooms() {
  const q = query(collection(db, 'rooms'), orderBy('lastActivity', 'desc'));
  roomsUnsub = onSnapshot(q, (snap) => {
    const rooms = [];
    snap.forEach(d => rooms.push({ id: d.id, ...d.data() }));
    renderRoomList(rooms);
  });
}

function renderRoomList(rooms) {
  const el = document.getElementById('roomList');
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? rooms.filter(r => r.name.toLowerCase().includes(q)) : rooms;
  if (filtered.length === 0) {
    el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">
      ${q ? 'Tidak ada room yang cocok' : 'Belum ada room. Buat yang pertama!'}</div>`;
    return;
  }
  el.innerHTML = '';
  filtered.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-item' + (currentRoom?.id === room.id ? ' active' : '');
    div.dataset.roomId = room.id;
    const lastTs = room.lastActivity ? timeStr(room.lastActivity) : '';
    div.innerHTML = `
      <div class="room-icon">${room.icon || '💬'}</div>
      <div class="room-meta">
        <div class="room-name">${room.name}</div>
        <div class="room-preview">${room.lastMsg || 'Belum ada pesan'}</div>
      </div>
      <div class="room-right">
        ${lastTs ? `<div class="room-time">${lastTs}</div>` : ''}
      </div>`;
    div.onclick = () => openRoom(room);
    el.appendChild(div);
  });
}

window.filterRooms = () => {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.room-item').forEach(el => {
    const name = el.querySelector('.room-name').textContent.toLowerCase();
    el.style.display = name.includes(q) ? '' : 'none';
  });
};

// ─── OPEN ROOM ───
async function openRoom(room) {
  currentRoom = room;
  document.getElementById('noRoomSelected').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';
  cv.classList.remove('hidden');

  document.getElementById('chIcon').textContent = room.icon || '💬';
  document.getElementById('chName').textContent = room.name;
  document.getElementById('chSub').textContent = room.description || 'Room chat';

  document.querySelectorAll('.room-item').forEach(el => {
    el.classList.toggle('active', el.dataset.roomId === room.id);
  });

  document.getElementById('msgContainer').innerHTML = '';
  if (messagesUnsub) messagesUnsub();
  listenMessages(room.id);
  document.getElementById('msgInput').focus();
}

// ─── MESSAGES ───
function listenMessages(roomId) {
  const q = query(collection(db, 'rooms', roomId, 'messages'), orderBy('createdAt', 'asc'));
  messagesUnsub = onSnapshot(q, (snap) => {
    const container = document.getElementById('msgContainer');
    container.innerHTML = '';
    let lastDate = '';
    snap.forEach(d => {
      const msg = { id: d.id, ...d.data() };
      const dateLabel2 = dateLabel(msg.createdAt);
      if (dateLabel2 !== lastDate) {
        const div = document.createElement('div');
        div.className = 'day-divider';
        div.innerHTML = `<span>${dateLabel2}</span>`;
        container.appendChild(div);
        lastDate = dateLabel2;
      }
      container.appendChild(buildBubble(msg));
    });
    scrollBottom();
  });
}

function buildBubble(msg) {
  const isSelf = msg.uid === currentUser.uid;
  const row = document.createElement('div');
  row.className = 'msg-row' + (isSelf ? ' self' : '');
  const avColor = avatarColor(msg.uid || 'x');
  const avText = initials(msg.displayName || 'U');
  row.innerHTML = `
    <div class="msg-av ${avColor}">${avText}</div>
    <div class="msg-content">
      ${!isSelf ? `<div class="msg-sender-label" style="color:var(--text2)">${msg.displayName || 'User'}</div>` : ''}
      <div class="bubble ${isSelf ? 'self' : 'other'}">${escapeHtml(msg.text)}</div>
      <div class="msg-meta">
        <span class="msg-time">${timeStr(msg.createdAt)}</span>
        ${isSelf ? '<span class="msg-tick">✓✓</span>' : ''}
      </div>
    </div>`;
  return row;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function scrollBottom() {
  const w = document.getElementById('messagesWrap');
  setTimeout(() => { w.scrollTop = w.scrollHeight; }, 50);
}

// ─── SEND MESSAGE ───
window.sendMessage = async () => {
  if (!currentRoom || !currentUser) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;
  try {
    await addDoc(collection(db, 'rooms', currentRoom.id, 'messages'), {
      text, uid: currentUser.uid,
      displayName: currentUser.displayName || currentUser.email,
      createdAt: serverTimestamp()
    });
    await updateDoc(doc(db, 'rooms', currentRoom.id), {
      lastMsg: text.length > 50 ? text.slice(0,50) + '...' : text,
      lastActivity: serverTimestamp()
    });
  } catch(e) {
    showToast('Gagal kirim pesan: ' + e.message, '❌');
  }
  document.getElementById('sendBtn').disabled = false;
  input.focus();
};

window.handleKey = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};

window.autoResize = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

window.handleTyping = () => {
  // typing indicator placeholder
};

// ─── CREATE ROOM ───
window.openNewRoomModal = () => {
  document.getElementById('newRoomName').value = '';
  document.getElementById('newRoomDesc').value = '';
  document.getElementById('newRoomErr').style.display = 'none';
  document.getElementById('newRoomModal').classList.remove('hidden');
};

window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

window.closeModalOutside = (e, id) => {
  if (e.target.id === id) closeModal(id);
};

window.createRoom = async () => {
  const name = document.getElementById('newRoomName').value.trim();
  const desc = document.getElementById('newRoomDesc').value.trim();
  const errEl = document.getElementById('newRoomErr');
  if (!name) {
    errEl.textContent = 'Nama room wajib diisi'; errEl.style.display = 'block'; return;
  }
  try {
    const ref = await addDoc(collection(db, 'rooms'), {
      name, description: desc || '',
      icon: selectedEmoji,
      createdBy: currentUser.uid,
      createdAt: serverTimestamp(),
      lastActivity: serverTimestamp(),
      lastMsg: ''
    });
    closeModal('newRoomModal');
    showToast('Room "' + name + '" berhasil dibuat!');
    const room = { id: ref.id, name, description: desc, icon: selectedEmoji };
    openRoom(room);
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
};

window.showRoomInfo = () => {
  if (!currentRoom) return;
  showToast(`Room: ${currentRoom.name} | ${currentRoom.description || 'Tidak ada deskripsi'}`, 'ℹ️');
};

// ─── EMOJI PICKER ───
function initEmojiPicker() {
  const container = document.getElementById('emojiPicker');
  container.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-pick' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => {
      selectedEmoji = e;
      document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    container.appendChild(btn);
  });
}
</script>
</body>
</html>
