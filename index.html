<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NgobrolinAja</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg0:#080b10; --bg1:#0d1117; --bg2:#161b22; --bg3:#1c2128;
  --bg4:#21262d; --bg5:#2d333b;
  --border:#30363d; --text1:#e6edf3; --text2:#9198a1; --text3:#656d76;
  --accent:#f97316; --accent2:#fb923c;
  --accent-dim:rgba(249,115,22,0.12); --accent-glow:rgba(249,115,22,0.25);
  --green:#3fb950; --blue:#58a6ff; --red:#f85149;
  --dm-color:#58a6ff; --dm-dim:rgba(88,166,255,0.12);
}
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg0); color:var(--text1); height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; }

/* ── AUTH ── */
#authScreen { width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 30% 20%,rgba(249,115,22,.08) 0%,transparent 60%),
              radial-gradient(ellipse at 70% 80%,rgba(88,166,255,.06) 0%,transparent 60%), var(--bg0); }
.auth-card { background:var(--bg2); border:1px solid var(--border); border-radius:18px; padding:40px 36px; width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.6); animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{opacity:0;transform:scale(.92) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }
.auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
.auth-logo-icon { width:42px; height:42px; border-radius:11px; background:linear-gradient(135deg,var(--accent),#f59e0b);
  display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 4px 16px var(--accent-glow); }
.auth-logo-text { font-size:20px; font-weight:800; letter-spacing:-.5px; }
.auth-logo-text span { color:var(--accent); }
.auth-tabs { display:flex; gap:4px; background:var(--bg3); border-radius:8px; padding:4px; margin-bottom:24px; }
.auth-tab { flex:1; padding:8px; text-align:center; border-radius:6px; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .2s; color:var(--text2); border:none; background:none; font-family:'Plus Jakarta Sans',sans-serif; }
.auth-tab.active { background:var(--bg5); color:var(--text1); }
.field-group { margin-bottom:14px; }
.field-group label { font-size:12px; color:var(--text2); font-weight:600; display:block; margin-bottom:6px; letter-spacing:.3px; }
.field-group input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 14px;
  font-size:13px; color:var(--text1); outline:none; font-family:'Plus Jakarta Sans',sans-serif; transition:border-color .15s,box-shadow .15s; }
.field-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.field-group input::placeholder { color:var(--text3); }
.auth-btn { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:9px;
  font-size:14px; font-weight:700; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .15s; margin-top:4px; letter-spacing:.3px; }
.auth-btn:hover { background:var(--accent2); transform:translateY(-1px); box-shadow:0 6px 20px var(--accent-glow); }
.auth-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
.auth-err { background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.3); border-radius:8px; padding:10px 14px;
  font-size:12px; color:var(--red); margin-bottom:14px; display:none; }

/* ── APP ── */
#appScreen { display:none; width:100%; height:100%; flex-direction:column; }

/* TOP NAV */
.topnav { background:var(--bg2); border-bottom:1px solid var(--border); height:44px; padding:0 14px;
  display:flex; align-items:center; gap:6px; flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
.topnav::-webkit-scrollbar { display:none; }
.tnav-logo { font-size:14px; font-weight:800; letter-spacing:-.3px; margin-right:8px; white-space:nowrap; }
.tnav-logo span { color:var(--accent); }
.tnav-sep { width:1px; height:18px; background:var(--border); margin:0 4px; flex-shrink:0; }
.tnav-btn { padding:4px 11px; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; border:none;
  white-space:nowrap; font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:.4px; transition:all .15s; }
.tnav-btn.orange { background:var(--accent); color:white; }
.tnav-btn.ghost { background:var(--bg4); color:var(--text2); border:1px solid var(--border); }
.tnav-btn.ghost:hover { background:var(--bg5); color:var(--text1); }
.tnav-user { margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); flex-shrink:0; }
.tnav-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:800; color:white; background:linear-gradient(135deg,var(--accent),#f59e0b); flex-shrink:0; }
.tnav-signout { padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; background:transparent;
  border:1px solid var(--border); color:var(--text3); cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; transition:all .15s; }
.tnav-signout:hover { border-color:var(--red); color:var(--red); background:rgba(248,81,73,.08); }

/* MAIN */
.main { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:275px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sb-header { padding:14px 14px 10px; border-bottom:1px solid var(--border); }
.sb-search { display:flex; align-items:center; gap:8px; background:var(--bg3); border:1px solid var(--border);
  border-radius:9px; padding:8px 12px; transition:border-color .15s; }
.sb-search:focus-within { border-color:var(--accent); }
.sb-search input { background:none; border:none; outline:none; font-size:12px; color:var(--text1);
  font-family:'Plus Jakarta Sans',sans-serif; width:100%; }
.sb-search input::placeholder { color:var(--text3); }

/* sidebar tabs */
.sb-tabs { display:flex; padding:8px 10px 0; gap:4px; border-bottom:1px solid var(--border); }
.sb-tab { flex:1; padding:7px 4px; font-size:12px; font-weight:700; cursor:pointer; border:none; background:none;
  color:var(--text3); font-family:'Plus Jakarta Sans',sans-serif; border-bottom:2px solid transparent;
  transition:all .15s; text-align:center; letter-spacing:.2px; }
.sb-tab.active { color:var(--text1); border-bottom-color:var(--accent); }
.sb-tab:hover:not(.active) { color:var(--text2); }

.sb-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.sb-section { padding:10px 10px 4px; }
.sb-section-label { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:1px;
  text-transform:uppercase; padding:0 4px; margin-bottom:6px; }
.new-btn { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:9px;
  border-radius:9px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .15s; margin-bottom:6px; letter-spacing:.3px; border:none; }
.new-btn.room { background:var(--accent-dim); color:var(--accent); border:1px dashed rgba(249,115,22,.4); }
.new-btn.room:hover { background:rgba(249,115,22,.2); border-color:var(--accent); }
.new-btn.dm { background:var(--dm-dim); color:var(--dm-color); border:1px dashed rgba(88,166,255,.4); }
.new-btn.dm:hover { background:rgba(88,166,255,.2); border-color:var(--dm-color); }

.list-wrap { flex:1; overflow-y:auto; padding:4px 6px 8px; }
.list-wrap::-webkit-scrollbar { width:3px; }
.list-wrap::-webkit-scrollbar-thumb { background:var(--bg5); border-radius:4px; }

/* list items */
.list-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:9px;
  cursor:pointer; transition:background .12s; position:relative; }
.list-item:hover { background:var(--bg3); }
.list-item.active { background:var(--bg4); }
.list-item.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
  width:3px; height:60%; border-radius:0 3px 3px 0; }
.list-item.active.type-room::before { background:var(--accent); }
.list-item.active.type-dm::before { background:var(--dm-color); }

.item-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0; background:var(--bg4); border:1px solid var(--border); }
.item-icon.dm-icon { border-radius:50%; font-size:14px; font-weight:800; color:white; }

.item-meta { flex:1; min-width:0; }
.item-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.item-preview { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.item-time { font-size:10px; color:var(--text3); }
.item-badge { color:white; font-size:10px; font-weight:800; padding:1px 6px; border-radius:10px; }
.item-badge.room-badge { background:var(--accent); }
.item-badge.dm-badge { background:var(--dm-color); }

/* online dot */
.online-dot { width:9px; height:9px; border-radius:50%; background:var(--green); border:2px solid var(--bg2); position:absolute; bottom:8px; right:8px; }

/* CHAT AREA */
.chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg1); }
.no-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text3); }
.no-chat .icon { font-size:52px; opacity:.35; }
.no-chat h3 { font-size:16px; font-weight:700; color:var(--text2); }
.no-chat p { font-size:13px; }

/* CHAT HEADER */
.chat-header { background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 18px;
  display:flex; align-items:center; gap:12px; flex-shrink:0; }
.ch-icon { width:38px; height:38px; border-radius:10px; background:var(--bg4); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.ch-icon.dm { border-radius:50%; font-size:14px; font-weight:800; color:white; }
.ch-info .ch-name { font-size:15px; font-weight:700; }
.ch-info .ch-sub { font-size:11px; color:var(--text3); }
.ch-sub.online { color:var(--green); }
.ch-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
.ch-search { display:flex; align-items:center; gap:8px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:7px 12px; }
.ch-search input { background:none; border:none; outline:none; font-size:12px; color:var(--text1); font-family:'Plus Jakarta Sans',sans-serif; width:160px; }
.ch-search input::placeholder { color:var(--text3); }
.icon-btn { width:32px; height:32px; border-radius:7px; background:var(--bg3); border:1px solid var(--border);
  color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.icon-btn:hover { background:var(--bg4); color:var(--text1); }

/* DM badge in header */
.dm-badge-header { font-size:10px; font-weight:700; background:var(--dm-dim); color:var(--dm-color);
  border:1px solid rgba(88,166,255,.3); padding:2px 8px; border-radius:20px; letter-spacing:.5px; }

/* MESSAGES */
.messages-wrap { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:2px; }
.messages-wrap::-webkit-scrollbar { width:4px; }
.messages-wrap::-webkit-scrollbar-thumb { background:var(--bg5); border-radius:4px; }
.day-divider { display:flex; align-items:center; gap:10px; margin:10px 0 8px; flex-shrink:0; }
.day-divider::before,.day-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.day-divider span { font-size:11px; color:var(--text3); white-space:nowrap; font-weight:500; }
.msg-row { display:flex; gap:8px; padding:2px 0; animation:fadeUp .18s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.msg-row.self { flex-direction:row-reverse; }
.msg-av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:800; flex-shrink:0; align-self:flex-end; margin-bottom:2px; }
.msg-content { max-width:62%; display:flex; flex-direction:column; gap:2px; }
.msg-row.self .msg-content { align-items:flex-end; }
.msg-sender-label { font-size:11px; font-weight:600; margin-bottom:2px; color:var(--text2); }
.bubble { padding:9px 13px; border-radius:14px; font-size:13px; line-height:1.55; word-break:break-word; }
.bubble.other { background:var(--bg3); border:1px solid var(--border); color:var(--text1); border-bottom-left-radius:4px; }
.bubble.self { background:linear-gradient(135deg,#1a3d2b,#1e4533); border:1px solid #2d5a3d; color:#d1fae5; border-bottom-right-radius:4px; }
.bubble.dm-other { background:#0f1e2e; border:1px solid #1a3a5c; color:#bfdbfe; border-bottom-left-radius:4px; }
.bubble.dm-self { background:linear-gradient(135deg,#0f1e2e,#0a1628); border:1px solid #1e4080; color:#bfdbfe; border-bottom-right-radius:4px; }
.msg-meta { display:flex; align-items:center; gap:5px; margin-top:1px; }
.msg-time { font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; }
.msg-tick { font-size:11px; color:var(--accent); }
.msg-tick.dm { color:var(--dm-color); }

/* INPUT */
.input-area { background:var(--bg2); border-top:1px solid var(--border); padding:12px 16px;
  display:flex; align-items:flex-end; gap:10px; flex-shrink:0; }
.input-box { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:12px;
  padding:10px 14px; display:flex; align-items:center; transition:border-color .15s,box-shadow .15s; }
.input-box:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.input-box.dm-input:focus-within { border-color:var(--dm-color); box-shadow:0 0 0 3px var(--dm-dim); }
.input-box textarea { flex:1; background:none; border:none; outline:none; font-size:13px; color:var(--text1);
  resize:none; font-family:'Plus Jakarta Sans',sans-serif; max-height:120px; line-height:1.5; overflow-y:auto; }
.input-box textarea::placeholder { color:var(--text3); }
.send-btn { width:40px; height:40px; border-radius:10px; color:white; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.send-btn.room-send { background:var(--accent); }
.send-btn.room-send:hover { background:var(--accent2); box-shadow:0 4px 16px var(--accent-glow); }
.send-btn.dm-send { background:var(--dm-color); }
.send-btn.dm-send:hover { background:#79b8ff; box-shadow:0 4px 16px rgba(88,166,255,.3); }
.send-btn:disabled { opacity:.4; cursor:not-allowed; }

/* MODALS */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center;
  justify-content:center; z-index:100; backdrop-filter:blur(4px); animation:fadeIn .15s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:28px 28px 24px;
  width:380px; box-shadow:0 24px 60px rgba(0,0,0,.6); animation:slideUp .2s cubic-bezier(.34,1.56,.64,1); }
@keyframes slideUp { from{opacity:0;transform:translateY(20px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.modal h3 { font-size:16px; font-weight:800; margin-bottom:18px; }
.modal-actions { display:flex; gap:8px; margin-top:20px; }
.modal-cancel { flex:1; padding:10px; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  color:var(--text2); font-size:13px; font-weight:600; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; transition:all .15s; }
.modal-cancel:hover { background:var(--bg4); color:var(--text1); }
.modal-confirm { flex:2; padding:10px; border:none; border-radius:8px; color:white; font-size:13px;
  font-weight:700; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; transition:all .15s; }
.modal-confirm.room-confirm { background:var(--accent); }
.modal-confirm.room-confirm:hover { background:var(--accent2); }
.modal-confirm.dm-confirm { background:var(--dm-color); }
.modal-confirm.dm-confirm:hover { background:#79b8ff; color:#0d1117; }
.modal-err { font-size:11px; color:var(--red); margin-top:6px; display:none; }
.emoji-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
.emoji-pick { width:38px; height:38px; border-radius:8px; font-size:18px; background:var(--bg3);
  border:2px solid transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.emoji-pick:hover,.emoji-pick.selected { border-color:var(--accent); background:var(--accent-dim); }

/* user search list */
.user-search-list { max-height:200px; overflow-y:auto; margin-top:8px; border-radius:8px; border:1px solid var(--border); }
.user-search-list::-webkit-scrollbar { width:3px; }
.user-search-list::-webkit-scrollbar-thumb { background:var(--bg5); border-radius:4px; }
.user-search-item { display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer;
  transition:background .12s; border-bottom:1px solid var(--border); }
.user-search-item:last-child { border-bottom:none; }
.user-search-item:hover { background:var(--bg3); }
.user-search-item.selected { background:var(--dm-dim); }
.user-search-av { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800; color:white; flex-shrink:0; }
.user-search-name { font-size:13px; font-weight:600; }
.user-search-email { font-size:11px; color:var(--text3); }
.user-search-check { margin-left:auto; color:var(--dm-color); font-size:16px; }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--bg4); border:1px solid var(--border);
  border-radius:10px; padding:12px 18px; font-size:13px; font-weight:500; color:var(--text1);
  box-shadow:0 8px 32px rgba(0,0,0,.5); z-index:999;
  animation:toastIn .25s cubic-bezier(.34,1.56,.64,1); display:flex; align-items:center; gap:8px; }
@keyframes toastIn { from{opacity:0;transform:translateY(12px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

.hidden { display:none !important; }
.av1{background:linear-gradient(135deg,#f97316,#f59e0b)} .av2{background:linear-gradient(135deg,#3b82f6,#06b6d4)}
.av3{background:linear-gradient(135deg,#10b981,#059669)} .av4{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.av5{background:linear-gradient(135deg,#ec4899,#db2777)} .av6{background:linear-gradient(135deg,#ef4444,#dc2626)}
.av7{background:linear-gradient(135deg,#14b8a6,#0d9488)} .av8{background:linear-gradient(135deg,#eab308,#ca8a04)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <div class="auth-logo-text">Ngobrolin<span>Aja</span></div>
    </div>
    <div id="authErr" class="auth-err"></div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Daftar</button>
    </div>
    <div id="loginForm">
      <div class="field-group"><label>EMAIL</label><input type="email" id="loginEmail" placeholder="email@kamu.com" autocomplete="email"></div>
      <div class="field-group"><label>PASSWORD</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">Masuk</button>
    </div>
    <div id="registerForm" class="hidden">
      <div class="field-group"><label>NAMA TAMPILAN</label><input type="text" id="regName" placeholder="Nama kamu"></div>
      <div class="field-group"><label>EMAIL</label><input type="email" id="regEmail" placeholder="email@kamu.com"></div>
      <div class="field-group"><label>PASSWORD</label><input type="password" id="regPassword" placeholder="Min. 6 karakter" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="auth-btn" id="registerBtn" onclick="doRegister()">Buat Akun</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="topnav">
    <div class="tnav-logo">Ngobrolin<span>Aja</span></div>
    <div class="tnav-sep"></div>
    <button class="tnav-btn orange">LIVE CHAT</button>
    <button class="tnav-btn ghost">GROUPS</button>
    <button class="tnav-btn ghost">BROADCAST</button>
    <div class="tnav-user">
      <div class="tnav-avatar" id="navAvatar">?</div>
      <span id="navName" style="font-weight:600;font-size:12px;"></span>
      <button class="tnav-signout" onclick="doSignOut()">Keluar</button>
    </div>
  </div>

  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-header">
        <div class="sb-search">

      <div class="sb-panel" id="panelRooms">

      <div class="sb-panel hidden" id="panelDms">
        <div class="sb-section">
          <button class="new-btn dm" onclick="openNewDmModal()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Mulai Chat Pribadi

    <!-- CHAT AREA -->

            <div class="ch-search">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#656d76" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" placeholder="Cari pesan...">
            </div>
            <button class="icon-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

<!-- NEW ROOM MODAL -->
<div id="newRoomModal" class="modal-overlay hidden" onclick="closeModalOutside(event,'newRoomModal')">
  <div class="modal">
    <h3>🏠 Buat Grup Baru</h3>
    <div class="field-group"><label>NAMA GRUP</label><input type="text" id="newRoomName" placeholder="misal: Tim Marketing"><div class="modal-err" id="newRoomErr"></div></div>
    <div class="field-group"><label>DESKRIPSI (opsional)</label><input type="text" id="newRoomDesc" placeholder="Topik grup ini..."></div>
    <div class="field-group"><label>IKON</label><div class="emoji-row" id="emojiPicker"></div></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('newRoomModal')">Batal</button>

</div>

<!-- NEW DM MODAL -->
<div id="newDmModal" class="modal-overlay hidden" onclick="closeModalOutside(event,'newDmModal')">
  <div class="modal">
    <h3>🔒 Chat Pribadi</h3>
    <p style="font-size:12px;color:var(--text3);margin-bottom:14px;">Cari pengguna yang ingin kamu ajak bicara secara pribadi.</p>
    <div class="field-group">
      <label>CARI PENGGUNA</label>
      <input type="text" id="dmSearchInput" placeholder="Ketik nama atau email..." oninput="searchUsers()">
      <div class="modal-err" id="newDmErr"></div>
    </div>
    <div class="user-search-list" id="userSearchList">
      <div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">Ketik untuk mencari pengguna...</div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('newDmModal')">Batal</button>
      <button class="modal-confirm dm-confirm" onclick="startDm()">Mulai Chat</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, onSnapshot,
  query, orderBy, limit, serverTimestamp, updateDoc, where, arrayUnion }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZAPWXDIPDr6_ye1hr4Qkfw6wMoJccZAg",
  authDomain: "ngobrolin-aja-77.firebaseapp.com",
  projectId: "ngobrolin-aja-77",
  storageBucket: "ngobrolin-aja-77.firebasestorage.app",
  messagingSenderId: "56435429415",
  appId: "1:56435429415:web:64b3f0274b13966e693e02"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── STATE ──
let currentUser = null;
let currentChat = null; // { id, type:'room'|'dm', ...data }
let messagesUnsub = null;
let roomsUnsub = null;
let dmsUnsub = null;
let selectedEmoji = '💬';
let selectedDmUser = null;
let currentSbTab = 'rooms';
const EMOJIS = ['💬','🍜','🍕','🎮','📊','💰','🏦','📋','🎯','🔥','⚡','🚀','🎉','💡','🛠️','📢'];

// ── UTILS ──
function avatarColor(uid) { return 'av' + (uid.charCodeAt(0) % 8 + 1); }
function initials(name) { return name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?'; }
function timeStr(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
}
function dateLabel(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((new Date() - d) / 86400000);
  if (diff === 0) return 'Hari ini';
  if (diff === 1) return 'Kemarin';
  return d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
}
function showToast(msg, icon='✅') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function dmConvoId(uid1, uid2) {
  return [uid1, uid2].sort().join('_');
}

// ── AUTH ──
window.switchTab = (tab) => {
  document.getElementById('authErr').style.display = 'none';
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
  document.getElementById('registerForm').classList.toggle('hidden', isLogin);
};
function showAuthErr(msg) { const e = document.getElementById('authErr'); e.textContent = msg; e.style.display = 'block'; }

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  if (!email || !pw) return showAuthErr('Email dan password wajib diisi.');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Memproses...';
  try { await signInWithEmailAndPassword(auth, email, pw); }
  catch(e) { showAuthErr(e.code==='auth/invalid-credential'?'Email atau password salah.':e.message); btn.disabled=false; btn.textContent='Masuk'; }
};

window.doRegister = async () => {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw = document.getElementById('regPassword').value;
  if (!name||!email||!pw) return showAuthErr('Semua field wajib diisi.');
  if (pw.length<6) return showAuthErr('Password minimal 6 karakter.');
  const btn = document.getElementById('registerBtn');
  btn.disabled=true; btn.textContent='Memproses...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db,'users',cred.user.uid), { displayName:name, email, uid:cred.user.uid, createdAt:serverTimestamp() });
  } catch(e) {
    showAuthErr(e.code==='auth/email-already-in-use'?'Email sudah terdaftar.':e.message);
    btn.disabled=false; btn.textContent='Buat Akun';
  }
};

window.doSignOut = async () => {
  if (roomsUnsub) roomsUnsub();
  if (dmsUnsub) dmsUnsub();
  if (messagesUnsub) messagesUnsub();
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    document.getElementById('navAvatar').textContent = initials(user.displayName || user.email);
    document.getElementById('navName').textContent = user.displayName || user.email;
    initEmojiPicker();
    listenRooms();
    listenDms();
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

// ── SIDEBAR TABS ──
window.switchSbTab = (tab) => {
  currentSbTab = tab;
  document.getElementById('tabRooms').classList.toggle('active', tab==='rooms');
  document.getElementById('tabDms').classList.toggle('active', tab==='dms');
  document.getElementById('panelRooms').classList.toggle('hidden', tab!=='rooms');
  document.getElementById('panelDms').classList.toggle('hidden', tab!=='dms');
};

// ── ROOMS ──
function listenRooms() {
  const q = query(collection(db,'rooms'), orderBy('lastActivity','desc'));
  roomsUnsub = onSnapshot(q, snap => {
    const rooms = [];
    snap.forEach(d => rooms.push({id:d.id,...d.data()}));
    renderRoomList(rooms);
  });
}

function renderRoomList(rooms) {
  const el = document.getElementById('roomList');
  if (!rooms.length) { el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Belum ada grup. Buat yang pertama!</div>`; return; }
  el.innerHTML = '';
  rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'list-item type-room' + (currentChat?.id===room.id?' active':'');
    div.dataset.id = room.id;
    div.innerHTML = `
      <div class="item-icon">${room.icon||'💬'}</div>
      <div class="item-meta">
        <div class="item-name">${room.name}</div>
        <div class="item-preview">${room.lastMsg||'Belum ada pesan'}</div>
      </div>
      <div class="item-right">${room.lastActivity?`<div class="item-time">${timeStr(room.lastActivity)}</div>`:''}</div>`;
    div.onclick = () => openChat({id:room.id, type:'room', ...room});
    el.appendChild(div);
  });
}

// ── DMs ──
function listenDms() {
  const q = query(collection(db,'dms'), where('members','array-contains',currentUser.uid), orderBy('lastActivity','desc'));
  dmsUnsub = onSnapshot(q, snap => {
    const dms = [];
    snap.forEach(d => dms.push({id:d.id,...d.data()}));
    renderDmList(dms);
  });
}

function renderDmList(dms) {
  const el = document.getElementById('dmList');
  if (!dms.length) { el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Belum ada chat pribadi.</div>`; return; }
  el.innerHTML = '';
  dms.forEach(dm => {
    const otherId = dm.members.find(m => m !== currentUser.uid);
    const otherName = dm.memberNames?.[otherId] || 'User';
    const avColor = avatarColor(otherId || 'x');
    const div = document.createElement('div');
    div.className = 'list-item type-dm' + (currentChat?.id===dm.id?' active':'');
    div.dataset.id = dm.id;
    div.innerHTML = `
      <div class="item-icon dm-icon ${avColor}">${initials(otherName)}</div>
      <div class="item-meta">
        <div class="item-name">${otherName}</div>
        <div class="item-preview">${dm.lastMsg||'Belum ada pesan'}</div>
      </div>
      <div class="item-right">${dm.lastActivity?`<div class="item-time">${timeStr(dm.lastActivity)}</div>`:''}</div>`;
    div.onclick = () => openChat({id:dm.id, type:'dm', otherName, otherId, ...dm});
    el.appendChild(div);
  });
}

window.filterList = () => {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.list-item').forEach(el => {
    const name = el.querySelector('.item-name').textContent.toLowerCase();
    el.style.display = name.includes(q) ? '' : 'none';
  });
};

// ── OPEN CHAT ──
function openChat(chat) {
  currentChat = chat;
  const isDm = chat.type === 'dm';

  document.getElementById('noChat').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';

  // header
  const iconEl = document.getElementById('chIcon');
  if (isDm) {
    iconEl.className = 'ch-icon dm ' + avatarColor(chat.otherId || 'x');
    iconEl.textContent = initials(chat.otherName || 'U');
    document.getElementById('chName').textContent = chat.otherName || 'User';
    document.getElementById('chSub').textContent = 'Chat pribadi';
    document.getElementById('chSub').className = 'ch-sub';
    document.getElementById('chDmBadge').classList.remove('hidden');
  } else {
    iconEl.className = 'ch-icon';
    iconEl.textContent = chat.icon || '💬';
    document.getElementById('chName').textContent = chat.name;
    document.getElementById('chSub').textContent = chat.description || 'Grup chat';
    document.getElementById('chSub').className = 'ch-sub';
    document.getElementById('chDmBadge').classList.add('hidden');
  }

  // input styling
  document.getElementById('inputBox').className = 'input-box' + (isDm ? ' dm-input' : '');
  document.getElementById('sendBtn').className = 'send-btn ' + (isDm ? 'dm-send' : 'room-send');
  document.getElementById('msgInput').placeholder = isDm ? 'Pesan pribadi...' : 'Ketik pesan...';

  // mark active
  document.querySelectorAll('.list-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === chat.id);
  });

  document.getElementById('msgContainer').innerHTML = '';
  if (messagesUnsub) messagesUnsub();

  const colPath = isDm ? `dms/${chat.id}/messages` : `rooms/${chat.id}/messages`;
  listenMessages(colPath, isDm);
  document.getElementById('msgInput').focus();
}

// ── MESSAGES ──
function listenMessages(colPath, isDm) {
  const q = query(collection(db, colPath), orderBy('createdAt','asc'));
  messagesUnsub = onSnapshot(q, snap => {
    const container = document.getElementById('msgContainer');
    container.innerHTML = '';
    let lastDate = '';
    snap.forEach(d => {
      const msg = {id:d.id,...d.data()};
      const dl = dateLabel(msg.createdAt);
      if (dl !== lastDate) {
        const div = document.createElement('div');
        div.className = 'day-divider';
        div.innerHTML = `<span>${dl}</span>`;
        container.appendChild(div);
        lastDate = dl;
      }
      container.appendChild(buildBubble(msg, isDm));
    });
    scrollBottom();
  });
}

function buildBubble(msg, isDm) {
  const isSelf = msg.uid === currentUser.uid;
  const row = document.createElement('div');
  row.className = 'msg-row' + (isSelf?' self':'');
  const avColor = avatarColor(msg.uid||'x');
  const avText = initials(msg.displayName||'U');
  const bubbleCls = isDm ? (isSelf?'dm-self':'dm-other') : (isSelf?'self':'other');
  row.innerHTML = `
    <div class="msg-av ${avColor}">${avText}</div>
    <div class="msg-content">
      ${!isSelf?`<div class="msg-sender-label">${msg.displayName||'User'}</div>`:''}
      <div class="bubble ${bubbleCls}">${escapeHtml(msg.text)}</div>
      <div class="msg-meta">
        <span class="msg-time">${timeStr(msg.createdAt)}</span>
        ${isSelf?`<span class="msg-tick${isDm?' dm':''}">✓✓</span>`:''}
      </div>
    </div>`;
  return row;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function scrollBottom() { const w=document.getElementById('messagesWrap'); setTimeout(()=>{w.scrollTop=w.scrollHeight;},50); }

// ── SEND ──
window.sendMessage = async () => {
  if (!currentChat||!currentUser) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value=''; autoResize(input);
  document.getElementById('sendBtn').disabled = true;
  const isDm = currentChat.type === 'dm';
  const colPath = isDm ? `dms/${currentChat.id}/messages` : `rooms/${currentChat.id}/messages`;
  const docPath = isDm ? `dms/${currentChat.id}` : `rooms/${currentChat.id}`;
  try {
    await addDoc(collection(db, colPath), {
      text, uid:currentUser.uid,
      displayName: currentUser.displayName||currentUser.email,
      createdAt: serverTimestamp()
    });
    await updateDoc(doc(db, docPath), {
      lastMsg: text.length>50?text.slice(0,50)+'...':text,
      lastActivity: serverTimestamp()
    });
  } catch(e) { showToast('Gagal kirim: '+e.message,'❌'); }
  document.getElementById('sendBtn').disabled = false;
  input.focus();
};

window.handleKey = (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.autoResize = (el) => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };

// ── CREATE ROOM ──
window.openNewRoomModal = () => {
  document.getElementById('newRoomName').value='';
  document.getElementById('newRoomDesc').value='';
  document.getElementById('newRoomErr').style.display='none';
  document.getElementById('newRoomModal').classList.remove('hidden');
};

window.createRoom = async () => {
  const name = document.getElementById('newRoomName').value.trim();
  const desc = document.getElementById('newRoomDesc').value.trim();
  const errEl = document.getElementById('newRoomErr');
  if (!name) { errEl.textContent='Nama grup wajib diisi'; errEl.style.display='block'; return; }
  try {
    const ref = await addDoc(collection(db,'rooms'), {
      name, description:desc||'', icon:selectedEmoji,
      createdBy:currentUser.uid, createdAt:serverTimestamp(),
      lastActivity:serverTimestamp(), lastMsg:''
    });
    closeModal('newRoomModal');
    showToast('Grup "'+name+'" berhasil dibuat!');
    openChat({id:ref.id, type:'room', name, description:desc, icon:selectedEmoji});
    switchSbTab('rooms');
  } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
};

// ── DM ──
window.openNewDmModal = () => {
  selectedDmUser = null;
  document.getElementById('dmSearchInput').value = '';
  document.getElementById('newDmErr').style.display = 'none';
  document.getElementById('userSearchList').innerHTML = `<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">Ketik untuk mencari pengguna...</div>`;
  document.getElementById('newDmModal').classList.remove('hidden');
};

let searchDebounce = null;
window.searchUsers = async () => {
  clearTimeout(searchDebounce);
  const q = document.getElementById('dmSearchInput').value.trim().toLowerCase();
  const listEl = document.getElementById('userSearchList');
  if (q.length < 2) {
    listEl.innerHTML = `<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">Ketik minimal 2 karakter...</div>`;
    return;
  }
  searchDebounce = setTimeout(async () => {
    listEl.innerHTML = `<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">Mencari...</div>`;
    try {
      const snap = await getDocs(collection(db,'users'));
      const users = [];
      snap.forEach(d => {
        const u = d.data();
        if (u.uid !== currentUser.uid &&
            (u.displayName?.toLowerCase().includes(q) || u.email?.toLowerCase().includes(q))) {
          users.push(u);
        }
      });
      if (!users.length) { listEl.innerHTML=`<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">Pengguna tidak ditemukan</div>`; return; }
      listEl.innerHTML = '';
      users.forEach(u => {
        const div = document.createElement('div');
        const isSelected = selectedDmUser?.uid === u.uid;
        div.className = 'user-search-item' + (isSelected?' selected':'');
        div.innerHTML = `
          <div class="user-search-av ${avatarColor(u.uid)}">${initials(u.displayName)}</div>
          <div>
            <div class="user-search-name">${u.displayName}</div>
            <div class="user-search-email">${u.email}</div>
          </div>
          ${isSelected?'<span class="user-search-check">✓</span>':''}`;
        div.onclick = () => {
          selectedDmUser = u;
          searchUsers();
        };
        listEl.appendChild(div);
      });
    } catch(e) { listEl.innerHTML=`<div style="padding:16px;color:var(--red);font-size:12px;">Error: ${e.message}</div>`; }
  }, 400);
};

window.startDm = async () => {
  const errEl = document.getElementById('newDmErr');
  if (!selectedDmUser) { errEl.textContent='Pilih pengguna terlebih dahulu'; errEl.style.display='block'; return; }
  const dmId = dmConvoId(currentUser.uid, selectedDmUser.uid);
  try {
    const dmRef = doc(db, 'dms', dmId);
    const existing = await getDoc(dmRef);
    if (!existing.exists()) {
      await setDoc(dmRef, {
        members: [currentUser.uid, selectedDmUser.uid],
        memberNames: {
          [currentUser.uid]: currentUser.displayName || currentUser.email,
          [selectedDmUser.uid]: selectedDmUser.displayName
        },
        createdAt: serverTimestamp(),
        lastActivity: serverTimestamp(),
        lastMsg: ''
      });
    }
    closeModal('newDmModal');
    showToast('Chat pribadi dengan '+selectedDmUser.displayName+' dibuka!');
    switchSbTab('dms');
    openChat({
      id:dmId, type:'dm',
      otherName: selectedDmUser.displayName,
      otherId: selectedDmUser.uid
    });
  } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
};

// ── MODAL HELPERS ──
window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
window.closeModalOutside = (e,id) => { if(e.target.id===id) closeModal(id); };

// ── EMOJI PICKER ──
function initEmojiPicker() {
  const container = document.getElementById('emojiPicker');
  container.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-pick'+(e===selectedEmoji?' selected':'');
    btn.textContent = e;
    btn.onclick = () => {
      selectedEmoji = e;
      document.querySelectorAll('.emoji-pick').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    container.appendChild(btn);
  });
}
</script>
